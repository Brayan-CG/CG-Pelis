<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/Solicitar.css">
    <link rel="stylesheet" href="css/Load.css">
    <title>Solicitar contenido</title>
</head>
<body>
    
    <!-- loader -->
    
    <div id="preloader"></div>
    
    <script src="js/load.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- logo -->
    
    <center>
        <div class="logo">
            <img src="Iconos/CG Pelis.png" width="50%"></img>
        </div>
    </center>
    
    <br><br><br>
    
    <section id="solicitar">
      <div class="solicitar">
      <h2>Solicitar contenido</h2>
        <form>
          <input type="user" placeholder="Nombre de usuario" required>
          <input type="email" placeholder="E-mail" required>
          <input type="text" placeholder="Nombre de la película, Serie o Animé" required>
          <br><br>
          
          <button type="submit" class="button_1"><img src="Iconos/Enviar.png" width="40%"></img></button></button>
        </form>
      </div>
    </section>
    
</body>
</html>
