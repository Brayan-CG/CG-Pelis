<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/Solicitar.css">
    <link rel="stylesheet" href="css/Load.css">
    <title>Solicitar contenido</title>
</head>
<body>
    
    <!-- loader -->
    
    <div id="preloader"></div>
    
    <script src="js/load.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- logo -->
    
    <center>
        <div class="logo">
            <img src="Iconos/CG Pelis.png" width="50%"></img>
        </div>
    </center>
    
    <br><br><br>
    
    <h3>¿ Que es solicitar contenido ?</h3>
    <p>solicitar contenido es una sección donde puedes enviar una solicitud para agregar una Película, Serie o Anime a la app.</p>
    
    <section id="solicitar">
      <div class="solicitar">
      <h2>Solicitar contenido</h2>
        <form action="https://formsubmit.co/cgstudios002@gmail.com" method="POST">
            <center>
          <input type="text" required placeholder="Nombre de usuario">
          
          <input type="email" placeholder="E-mail" required>
          
          <br><br>
          
          <input type="text" placeholder="Nombre de la película" required>
          </center>
          <br><br>
          
<button type="submit" class="button_1"><img src="Iconos/Enviar.png" width="50%"></img></button>

<input type="hidden" name="_next" value="https://cg-pelis.netlify.app/inicio">

<input type="hidden" name="_captcha" value="false">

        </form>
      </div>
    </section>
    
    <script src="js/solicitar.js"></script>
    
</body>
</html>
